  <text x="256" y="483" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="17" font-weight="400" fill="#D48582" opacity="0.7" letter-spacing="2">甜品日记</text>
