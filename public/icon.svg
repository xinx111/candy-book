<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#FFF8EE"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)" stroke="#EDE0D4" stroke-width="2"/>

  <!-- ============ 🍰 蛋糕（左） ============ -->
  <!-- 盘子 -->
  <ellipse cx="180" cy="342" rx="64" ry="14" fill="#F0E0D0" stroke="#D4B896" stroke-width="3"/>

  <!-- 蛋糕主体 -->
  <rect x="120" y="258" width="120" height="74" rx="14" fill="#F5D6A8" stroke="#C49A6C" stroke-width="4"/>
  <!-- 蛋糕底部收边 -->
  <path d="M124 325 Q180 335 236 325" fill="none" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>

  <!-- 奶油层 -->
  <!-- 奶油层主体 -->
  <rect x="120" y="250" width="120" height="34" rx="10" fill="#FFFAF0" stroke="#D4A574" stroke-width="3.5"/>
  <!-- 奶油与蛋糕的分界线 -->
  <path d="M124 283 Q180 286 236 283" fill="none" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>

  <!-- 奶油波浪上边缘 -->
  <path d="M120 256 Q130 236 148 250 Q158 238 168 252 Q178 236 190 250 Q200 236 212 250 Q222 238 235 252 Q244 236 240 256 Z" fill="#FFFAF0" stroke="#D4A574" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- 奶油滴落（左边） -->
  <path d="M128 284 Q126 298 132 310 Q134 316 139 310 Q142 298 140 284" fill="#FFFAF0" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>
  <!-- 奶油滴落（右边） -->
  <path d="M232 284 Q234 300 228 312 Q226 318 221 312 Q218 300 220 284" fill="#FFFAF0" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>

  <!-- 草莓下方的小奶油堆（连接草莓和奶油层） -->
  <path d="M158 236 Q168 218 180 214 Q192 218 202 236 Q196 228 180 224 Q164 228 158 236 Z" fill="#FFFAF0" stroke="#D4A574" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 草莓 -->
  <path d="M162 234 Q180 200 198 234 Z" fill="#E8716D" stroke="#C0392B" stroke-width="3" stroke-linejoin="round"/>
  <!-- 草莓高光 -->
  <path d="M170 224 Q180 214 188 224" fill="none" stroke="#FF9A8A" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- 草莓籽 -->
  <circle cx="175" cy="228" r="2" fill="#FFD4C0"/>
  <circle cx="183" cy="222" r="2" fill="#FFD4C0"/>
  <circle cx="190" cy="232" r="2" fill="#FFD4C0"/>
  <circle cx="171" cy="237" r="2" fill="#FFD4C0"/>
  <!-- 草莓叶子 -->
  <path d="M160 234 Q168 218 176 234 Q172 226 168 232" fill="#7DA87B" stroke="#5A8A5A" stroke-width="2" stroke-linecap="round"/>
  <path d="M180 234 Q185 218 190 234 Q185 226 182 232" fill="#7DA87B" stroke="#5A8A5A" stroke-width="2" stroke-linecap="round"/>
  <!-- 叶子梗 -->
  <path d="M168 229 Q175 218 182 229" fill="none" stroke="#5A8A5A" stroke-width="2" stroke-linecap="round"/>

  <!-- 蛋糕脸蛋（在奶油层下方） -->
  <!-- 眼睛 -->
  <ellipse cx="156" cy="296" rx="6" ry="7" fill="#5D4037"/>
  <ellipse cx="204" cy="296" rx="6" ry="7" fill="#5D4037"/>
  <!-- 高光 -->
  <circle cx="158" cy="293" r="2.5" fill="#FFF"/>
  <circle cx="206" cy="293" r="2.5" fill="#FFF"/>
  <!-- 腮红 -->
  <ellipse cx="142" cy="310" rx="10" ry="7" fill="#FFB5B5" opacity="0.55"/>
  <ellipse cx="218" cy="310" rx="10" ry="7" fill="#FFB5B5" opacity="0.55"/>
  <!-- 嘴巴（笑） -->
  <path d="M174 306 Q180 318 186 306" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>

  <!-- ============ 🧋 奶茶（右） ============ -->
  <!-- 杯子主体 -->
  <rect x="285" y="200" width="110" height="130" rx="28" fill="#FFF5E8" stroke="#C49A6C" stroke-width="4"/>
  <!-- 杯底弧线 -->
  <path d="M295 325 Q340 340 385 325" fill="none" stroke="#C49A6C" stroke-width="3" stroke-linecap="round"/>

  <!-- 奶茶液体 -->
  <rect x="294" y="235" width="92" height="90" rx="18" fill="#C8E6C9" stroke="#A8C9A8" stroke-width="2"/>
  <!-- 奶茶顶部波浪 -->
  <path d="M294 245 Q310 235 325 245 Q340 235 355 245 Q370 235 386 245" fill="none" stroke="#A8C9A8" stroke-width="3" stroke-linecap="round"/>

  <!-- 珍珠 -->
  <circle cx="315" cy="275" r="9" fill="#5D4037"/>
  <circle cx="350" cy="268" r="9" fill="#5D4037"/>
  <circle cx="330" cy="295" r="9" fill="#5D4037"/>
  <circle cx="368" cy="288" r="9" fill="#5D4037"/>
  <circle cx="312" cy="312" r="9" fill="#5D4037"/>
  <circle cx="348" cy="310" r="9" fill="#5D4037"/>
  <circle cx="370" cy="312" r="9" fill="#5D4037"/>
  <!-- 珍珠高光 -->
  <circle cx="313" cy="273" r="3" fill="#FFF" opacity="0.35"/>
  <circle cx="348" cy="266" r="3" fill="#FFF" opacity="0.35"/>
  <circle cx="328" cy="293" r="3" fill="#FFF" opacity="0.35"/>

  <!-- 杯盖 -->
  <rect x="280" y="192" width="120" height="18" rx="9" fill="#D4A574" stroke="#B8895A" stroke-width="3"/>
  <!-- 盖子封口线 -->
  <rect x="285" y="197" width="110" height="4" rx="2" fill="#C49A6C" opacity="0.3"/>

  <!-- 吸管 -->
  <rect x="350" y="130" width="14" height="68" rx="7" fill="#E8716D" stroke="#C0392B" stroke-width="2"/>
  <!-- 吸管顶部装饰 -->
  <path d="M350 138 Q357 126 364 138 Z" fill="#E8716D" stroke="#C0392B" stroke-width="2" stroke-linejoin="round"/>
  <!-- 吸管条纹 -->
  <line x1="350" y1="155" x2="364" y2="155" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="350" y1="170" x2="364" y2="170" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="350" y1="185" x2="364" y2="185" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>

  <!-- 奶茶脸蛋 -->
  <!-- 眼睛（眯眼笑） -->
  <path d="M322 255 Q328 248 334 255" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M352 255 Q358 248 364 255" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
  <!-- 腮红 -->
  <ellipse cx="315" cy="268" rx="9" ry="7" fill="#FFB5B5" opacity="0.55"/>
  <ellipse cx="371" cy="268" rx="9" ry="7" fill="#FFB5B5" opacity="0.55"/>
  <!-- 嘴巴 -->
  <path d="M335 268 Q343 278 351 268" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>

  <!-- ============ 装饰元素 ============ -->
  <!-- 小爱心 -->
  <path d="M256 225 Q256 215 262 215 Q268 215 268 225 Q268 235 256 243 Q244 235 244 225 Q244 215 250 215 Q256 215 256 225 Z" fill="#E8716D" opacity="0.65"/>
  <!-- 爱心高光 -->
  <path d="M252 222 Q256 218 260 222" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- 小星星 -->
  <polygon points="262,175 264,182 271,182 266,186 268,193 262,188 256,193 258,186 253,182 260,182" fill="#FFD93D" opacity="0.75"/>

  <!-- 小圆点装饰 -->
  <circle cx="248" cy="285" r="3" fill="#E8C9A0" opacity="0.5"/>
  <circle cx="270" cy="300" r="2.5" fill="#E8C9A0" opacity="0.5"/>
</svg>
