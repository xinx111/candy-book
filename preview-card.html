<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡片预览</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #FFF0F0; }
  .card-tag { background: #F0D0D0; color: #8B5E3C; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">
  <div class="bg-[#FFF5F5] rounded-lg mb-5 cursor-pointer relative transition-all duration-200 shadow-[0_0_0_3px_white,0_4px_12px_rgba(0,0,0,0.1)]" style="width:360px; transform:rotate(-0.5deg)">

    <!-- 和纸胶带：一半在背景一半在卡片上 -->
    <div class="absolute -top-4 left-1/2 -translate-x-1/2 z-10" style="filter:drop-shadow(1px 2px 3px rgba(0,0,0,0.08))">
      <div class="w-10 h-8" style="background:rgba(255,240,240,0.85);background-image:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(200,180,170,0.15) 6px,rgba(200,180,170,0.15) 10px);clip-path:polygon(0% 20%,4% 0%,8% 25%,12% 5%,16% 30%,20% 10%,24% 35%,96% 10%,100% 30%,97% 50%,100% 70%,98% 90%,95% 70%,16% 90%,12% 70%,8% 95%,4% 75%,0% 100%)"></div>
    </div>

    <!-- 内容区 -->
    <div class="overflow-hidden rounded-lg">
      <div class="w-full h-[200px] bg-gradient-to-br from-[#F0D0D0] to-[#E8C0C0] flex items-center justify-center text-6xl">🍰🧋</div>

      <div class="absolute top-3 right-3 z-10 flex gap-1.5">
        <span class="w-7 h-7 bg-white/85 backdrop-blur rounded-full flex items-center justify-center text-[13px] cursor-pointer shadow-sm">✕</span>
        <span class="w-7 h-7 bg-white/85 backdrop-blur rounded-full flex items-center justify-center text-[13px] cursor-pointer shadow-sm">📤</span>
      </div>

      <div class="absolute top-3 left-3 flex gap-1.5 flex-wrap">
        <span class="card-tag">抹茶</span>
        <span class="card-tag">绵密</span>
      </div>

      <div class="absolute bottom-[52px] right-3 text-lg tracking-[2px] bg-white/85 backdrop-blur px-2.5 py-1 rounded-pill">🥄🥄🥄🥄</div>

      <div class="px-3.5 pt-1.5">
        <span class="text-sm font-semibold text-[#3C2415] truncate block">抹茶千层蛋糕</span>
      </div>

      <div class="flex justify-between items-center px-3.5 py-3">
        <span class="text-sm font-medium text-[#3C2415]">📍 抹茶研究所</span>
        <span class="text-[13px] text-[#8B5E3C] font-semibold">¥42</span>
      </div>
    </div>
  </div>
</body>
</html>
